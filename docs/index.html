<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Polish4Beginners APK</title>
    <meta
      name="description"
      content="Download P4B, an open-source Polish for beginners Android app for English speakers."
    >
    <style>
      :root {
        color-scheme: light;
        --ink: #17211f;
        --muted: #60706b;
        --paper: #f8f4ec;
        --card: #fffaf0;
        --line: #d8cbb4;
        --accent: #1f6655;
        --accent-dark: #164b3f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 680px);
        padding: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 7vw, 4rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.125rem;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        color: inherit;
      }

      .button {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        font-weight: 800;
        text-decoration: none;
      }

      .button:focus,
      .button:hover {
        background: var(--accent-dark);
      }

      .meta {
        margin-top: 20px;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Polish4Beginners</h1>
      <p>An open-source Android app for English speakers learning Polish phrases, vocabulary, grammar, and pronunciation.</p>
      <div class="actions">
        <a class="button" href="P4B.apk" download>Download P4B.apk</a>
        <a href="https://github.com/lida0407/Polish4Beginners-for-English-speakers">View source on GitHub</a>
      </div>
      <p class="meta">Android debug APK for testing and self-study.</p>
    </main>
  </body>
</html>
